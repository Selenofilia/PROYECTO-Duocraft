<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro — LinguaQuest</title>
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="mark" aria-hidden="true"></div>
        <div class="header-text">
          <p class="logo">LinguaQuest</p>
          <p class="tagline">Alta en la plataforma</p>
        </div>
      </header>

      <main class="card">
        <div class="steps" aria-hidden="true">
          <span class="is-on" data-step-dot></span>
          <span data-step-dot></span>
        </div>

        <h1>Crear tu perfil</h1>
        <p id="registro-hint">Datos básicos del explorador.</p>

        <form action="inicio.html" method="get" data-wizard>
          <div class="wizard-pane is-active" data-pane>
            <div class="field">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" name="nombre" required placeholder="Ana" />
            </div>
            <div class="field">
              <label for="apellidos">Apellidos</label>
              <input type="text" id="apellidos" name="apellidos" required placeholder="García López" />
            </div>
            <div class="field">
              <label for="correo">Correo</label>
              <input type="email" id="correo" name="correo" required placeholder="ana@universidad.edu" />
            </div>
          </div>

          <div class="wizard-pane" data-pane>
            <div class="field">
              <label for="idioma">Idioma</label>
              <select id="idioma" name="idioma" required>
                <option value="">Elige</option>
                <option value="en">Inglés A2</option>
                <option value="fr">Francés B1</option>
                <option value="de">Alemán A1</option>
              </select>
            </div>
            <div class="field">
              <label for="circulo">Círculo de clase</label>
              <select id="circulo" name="circulo" required>
                <option value="">Elige</option>
                <option value="coral">Círculo Coral</option>
                <option value="indigo">Círculo Índigo</option>
              </select>
            </div>
            <div class="field">
              <label for="rol">Rol en el círculo</label>
              <select id="rol" name="rol" required>
                <option value="">Elige</option>
                <option value="voz">Voz — oral y debates</option>
                <option value="texto">Texto — escritura y gramática</option>
                <option value="escucha">Escucha — audio y vocabulario</option>
              </select>
            </div>
          </div>

          <div class="btn-row">
            <button type="button" class="btn btn--ghost" data-back hidden>Atrás</button>
            <button type="button" class="btn" data-next>Siguiente</button>
            <button type="submit" class="btn" data-submit hidden>Ir al inicio</button>
          </div>
        </form>
      </main>

      <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem">
        <a href="index.html">Volver</a>
      </p>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
